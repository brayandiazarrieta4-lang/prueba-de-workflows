name: Verificación Completa

on:
  push:
    branches:
      - main

jobs:
  validar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Verificar index.html
        run: test -f index.html

      - name: Verificar README.md
        run: test -f README.md

      - name: Verificar CSS
        run: test -f css/style.css

      - name: Verificar JS
        run: test -f js/script.js

      - name: Proyecto válido
        run: echo "Todos los archivos existen"
